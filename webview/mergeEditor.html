<!DOCTYPE html>
<html lang="{{HTML_LANG}}">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="{{CSP}}" />
    <style>
      * {
        box-sizing: border-box;
      }
      /* 100% fills the webview iframe; avoid 100vh — it tracks the window, not the editor pane */
      html {
        height: 100%;
        width: 100%;
      }
      body {
        margin: 0;
        padding: 12px 14px;
        font-family: var(--vscode-font-family);
        font-size: var(--vscode-font-size);
        color: var(--vscode-foreground);
        background: var(--vscode-editor-background);
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }
      .merge-header {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 8px;
        padding: 12px 14px;
        background: var(--vscode-sideBar-background, var(--vscode-editor-background));
        border: 1px solid var(--vscode-panel-border);
        border-radius: 6px;
      }
      .merge-header[hidden] {
        display: none !important;
      }
      .editor-shell {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .editor-shell[hidden] {
        display: none !important;
      }
      .git-merge-panel {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 4px;
        background: var(
          --vscode-inputValidation-warningBackground,
          color-mix(in srgb, var(--vscode-editorWarning-foreground, #cca700) 10%, transparent)
        );
        border: 1px solid var(--vscode-inputValidation-warningBorder, var(--vscode-editorWarning-foreground, #cca700));
      }
      .git-merge-panel[hidden] {
        display: none !important;
      }
      .git-merge-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding-bottom: 4px;
        border-bottom: 1px solid var(--vscode-panel-border);
      }
      .git-merge-toolbar button {
        font-size: 11px;
        padding: 6px 12px;
        cursor: pointer;
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
        border: 1px solid var(--vscode-button-border, transparent);
        border-radius: 4px;
      }
      .git-merge-toolbar button:hover {
        background: var(--vscode-button-secondaryHoverBackground);
      }
      .git-merge-toolbar button.git-merge-pick-primary {
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
      }
      .git-merge-toolbar button.git-merge-pick-primary:hover {
        background: var(--vscode-button-hoverBackground);
      }
      .git-merge-title {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .git-merge-hint {
        margin: 0;
        font-size: 10px;
        opacity: 0.85;
        line-height: 1.35;
      }
      /* Fills remaining height in the panel; scrolls when there are many conflicts (no fixed cap). */
      .git-merge-cards {
        display: flex;
        flex-direction: column;
        gap: 10px;
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
      }
      .git-merge-card {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 8px 10px;
        background: var(--vscode-editor-background);
        border: 1px solid var(--vscode-panel-border);
        border-radius: 4px;
      }
      .git-merge-card-id {
        font-family: var(--vscode-editor-font-family);
        font-size: 10px;
        line-height: 1.35;
        word-break: break-word;
        opacity: 0.95;
      }
      .git-merge-cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        align-items: start;
      }
      @media (max-width: 520px) {
        .git-merge-cols {
          grid-template-columns: 1fr;
        }
      }
      .git-merge-side-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        opacity: 0.8;
        margin-bottom: 4px;
      }
      .git-merge-pre {
        margin: 0;
        padding: 6px 8px;
        font-family: var(--vscode-editor-font-family);
        font-size: 11px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 9rem;
        overflow-y: auto;
        background: var(--vscode-textBlockQuote-background, var(--vscode-input-background));
        border: 1px solid var(--vscode-panel-border);
        border-radius: 3px;
        color: var(--vscode-foreground);
      }
      .git-merge-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .git-merge-actions button {
        font-size: 11px;
        padding: 5px 10px;
        cursor: pointer;
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
        border: 1px solid var(--vscode-button-border, transparent);
        border-radius: 4px;
      }
      .git-merge-actions button:hover {
        background: var(--vscode-button-secondaryHoverBackground);
      }
      .git-merge-actions button.git-merge-pick-primary {
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
      }
      .git-merge-actions button.git-merge-pick-primary:hover {
        background: var(--vscode-button-hoverBackground);
      }
      .merge-header-main {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 14px 16px;
        row-gap: 12px;
      }
      .file-stats {
        flex: 1 1 100%;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 10px;
        min-width: 0;
        padding-bottom: 2px;
      }
      .stat-chip {
        display: inline-flex;
        flex-direction: row;
        align-items: baseline;
        gap: 6px;
        min-width: 0;
        padding: 4px 9px;
        border-radius: 4px;
        background: var(--vscode-input-background);
        border: 1px solid var(--vscode-panel-border);
        font-size: 10px;
        line-height: 1.25;
        opacity: 0.95;
      }
      .stat-chip .stat-value {
        font-size: 13px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
      }
      .stat-chip .stat-label {
        opacity: 0.78;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        font-size: 9px;
      }
      .stat-chip.stat-total .stat-value {
        color: var(--vscode-foreground);
      }
      .stat-chip.stat-missing {
        border-color: var(--vscode-inputValidation-errorBorder, var(--vscode-charts-red));
      }
      .stat-chip.stat-missing .stat-value {
        color: var(--vscode-errorForeground, var(--vscode-charts-red));
      }
      .stat-chip.stat-review {
        border-color: var(--vscode-inputValidation-warningBorder, var(--vscode-charts-yellow));
      }
      .stat-chip.stat-review .stat-value {
        color: var(--vscode-editorWarning-foreground, var(--vscode-charts-yellow));
      }
      .stat-chip.stat-adapt .stat-value {
        color: var(--vscode-editorInfo-foreground, var(--vscode-charts-blue));
      }
      .stat-chip.stat-done .stat-value {
        color: var(--vscode-testing-iconPassed, var(--vscode-charts-green));
      }
      #status {
        flex: 0 0 auto;
        margin-bottom: 4px;
        opacity: 0.92;
        line-height: 1.35;
        font-size: 11px;
      }
      .filters {
        flex: 1 1 100%;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        gap: 12px 14px;
        min-width: 0;
        padding-top: 2px;
      }
      .deepl-batch-wrap {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        min-width: 0;
      }
      .deepl-batch-btn {
        font-size: 12px;
        padding: 6px 12px;
        white-space: nowrap;
        cursor: pointer;
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border: 1px solid var(--vscode-button-border, transparent);
        border-radius: 4px;
      }
      .deepl-batch-btn:hover:not(:disabled) {
        background: var(--vscode-button-hoverBackground);
      }
      .deepl-batch-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .filter-grow {
        flex: 1 1 160px;
        min-width: 120px;
      }
      .filter-empty-only {
        flex: 0 0 auto;
        align-self: flex-end;
        padding-bottom: 2px;
      }
      .filter-empty-target-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        user-select: none;
        margin: 0;
      }
      .filter-empty-target-label input {
        margin: 0;
        cursor: pointer;
      }
      .filter-field label {
        display: block;
        font-size: 10px;
        font-weight: 600;
        opacity: 0.88;
        letter-spacing: 0.03em;
        margin-bottom: 4px;
      }
      .filter-text {
        width: 100%;
        font-size: 13px;
        font-family: var(--vscode-font-family);
        color: var(--vscode-input-foreground);
        background: var(--vscode-input-background);
        border: 1px solid var(--vscode-input-border, var(--vscode-widget-border));
        border-radius: 4px;
        padding: 6px 10px;
      }
      .filter-text::placeholder {
        opacity: 0.55;
      }
      .filter-clear {
        font-size: 12px;
        padding: 6px 12px;
        margin-top: 0;
        cursor: pointer;
        align-self: flex-end;
        margin-bottom: 0;
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
        border: 1px solid var(--vscode-button-border, transparent);
        border-radius: 4px;
      }
      .filter-clear:hover {
        background: var(--vscode-button-secondaryHoverBackground);
      }
      .filter-hint {
        flex: 0 0 auto;
        align-self: stretch;
        font-size: 10px;
        opacity: 0.72;
        margin: 2px 0 0;
        line-height: 1.45;
      }
      /* Multi-state dropdown */
      .filter-state-wrap {
        flex: 0 1 220px;
        min-width: 160px;
        position: relative;
        z-index: 4;
      }
      .state-dd-toggle {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        text-align: left;
        font-size: 11px;
        font-family: var(--vscode-font-family);
        color: var(--vscode-dropdown-foreground);
        background: var(--vscode-dropdown-background);
        border: 1px solid var(--vscode-dropdown-border, var(--vscode-widget-border));
        border-radius: 4px;
        padding: 4px 8px;
        cursor: pointer;
      }
      .state-dd-toggle:hover {
        background: var(--vscode-list-hoverBackground, var(--vscode-dropdown-background));
      }
      .state-dd-toggle[aria-expanded='true'] {
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
      }
      .state-dd-summary {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .state-dd-caret {
        flex: 0 0 auto;
        opacity: 0.7;
        font-size: 10px;
      }
      .state-dd-panel {
        position: absolute;
        left: 0;
        right: 0;
        top: 100%;
        margin-top: -1px;
        max-height: 220px;
        overflow: auto;
        padding: 8px 10px 10px;
        background: var(--vscode-dropdown-background);
        border: 1px solid var(--vscode-dropdown-border, var(--vscode-widget-border));
        border-top: none;
        border-radius: 0 0 4px 4px;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
      }
      .state-dd-panel[hidden] {
        display: none !important;
      }
      .state-dd-hint {
        font-size: 10px;
        opacity: 0.75;
        line-height: 1.35;
        margin: 0 0 8px;
      }
      .state-dd-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 0;
        font-size: 12px;
        cursor: pointer;
        user-select: none;
      }
      .state-dd-row:hover {
        color: var(--vscode-list-activeSelectionForeground, var(--vscode-foreground));
        background: var(--vscode-list-hoverBackground, transparent);
        margin: 0 -6px;
        padding-left: 6px;
        padding-right: 6px;
        border-radius: 3px;
      }
      .state-dd-row input {
        flex: 0 0 auto;
        cursor: pointer;
      }
      .state-dd-row span {
        flex: 1;
        min-width: 0;
        word-break: break-word;
      }
      #viewport {
        flex: 1 1 auto;
        overflow: auto;
        border: 1px solid var(--vscode-panel-border);
        border-radius: 4px;
        min-height: 120px;
      }
      #spacer {
        position: relative;
        width: 100%;
      }
      .row {
        display: grid;
        /* Actions column: no fixed width — size to AL + XLF + DeepL in one row */
        grid-template-columns:
          minmax(72px, 1fr)
          minmax(96px, 1.25fr)
          minmax(min-content, max-content)
          minmax(96px, 1.25fr)
          minmax(100px, 1fr);
        gap: 8px 10px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--vscode-panel-border);
        align-items: start;
        min-height: 108px;
        isolation: isolate;
      }
      .cell {
        word-break: break-word;
        min-width: 0;
        overflow: hidden;
      }
      .cell.src {
        white-space: pre-wrap;
        font-size: 15px;
        line-height: 1.48;
        opacity: 0.95;
        max-height: 5rem;
        overflow-y: auto;
      }
      .cell.id {
        font-family: var(--vscode-editor-font-family);
        font-size: 9px;
        line-height: 1.3;
        opacity: 0.88;
        max-height: 4.1rem;
        overflow-y: auto;
      }
      .cell.jump {
        /* Wider than min-width:0 so the actions column sizes to the three buttons */
        min-width: min-content;
        overflow: visible;
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        gap: 6px;
        align-items: center;
        justify-content: flex-start;
        align-self: start;
        padding-top: 4px;
      }
      .jump-btn {
        flex: 0 0 auto;
        width: auto;
        white-space: nowrap;
        font-size: 11px;
        padding: 5px 9px;
        cursor: pointer;
        background: var(--vscode-button-secondaryBackground);
        color: var(--vscode-button-secondaryForeground);
        border: 1px solid var(--vscode-button-border, transparent);
        border-radius: 4px;
      }
      .jump-btn:hover {
        background: var(--vscode-button-secondaryHoverBackground);
      }
      .target-input {
        width: 100%;
        min-height: 58px;
        max-height: 5rem;
        resize: none;
        overflow-y: auto;
        font-family: var(--vscode-editor-font-family);
        font-size: 15px;
        line-height: 1.48;
        color: var(--vscode-input-foreground);
        background: var(--vscode-input-background);
        border: 1px solid var(--vscode-input-border, var(--vscode-widget-border));
        border-radius: 4px;
        padding: 7px 9px;
      }
      .state-select {
        width: 100%;
        font-size: 12px;
        color: var(--vscode-dropdown-foreground);
        background: var(--vscode-dropdown-background);
        border: 1px solid var(--vscode-dropdown-border, var(--vscode-widget-border));
        border-radius: 4px;
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <div id="mergeHeader" class="merge-header" hidden aria-label="">
      <div id="gitMergePanel" class="git-merge-panel" hidden>
        <h3 id="gitMergeTitle" class="git-merge-title"></h3>
        <p id="gitMergeHint" class="git-merge-hint"></p>
        <div class="git-merge-toolbar" id="gitMergeToolbar">
          <button type="button" class="git-merge-pick-primary" id="gitMergeAcceptAllOurs"></button>
          <button type="button" id="gitMergeAcceptAllTheirs"></button>
        </div>
        <div id="gitMergeCards" class="git-merge-cards"></div>
      </div>
      <div id="editorShell" class="editor-shell" hidden>
        <div class="merge-header-main">
          <div id="fileStats" class="file-stats" aria-label=""></div>
          <div id="filters" class="filters">
            <div class="deepl-batch-wrap">
              <button type="button" id="deeplTranslateBatch" class="deepl-batch-btn"></button>
            </div>
            <div class="filter-field filter-state-wrap">
              <label id="stateFilterLabel"></label>
              <div class="state-dd" id="stateDd">
                <button type="button" class="state-dd-toggle" id="stateDdToggle" aria-expanded="false" aria-haspopup="true">
                  <span class="state-dd-summary" id="stateDdSummary"></span>
                  <span class="state-dd-caret" aria-hidden="true">▾</span>
                </button>
                <div class="state-dd-panel" id="stateDdPanel" hidden role="group" aria-labelledby="stateFilterLabel">
                  <p id="stateDdHint" class="state-dd-hint"></p>
                  <div id="stateDdList"></div>
                </div>
              </div>
            </div>
            <div class="filter-field filter-empty-only">
              <label class="filter-empty-target-label">
                <input type="checkbox" id="filterEmptyTarget" />
                <span id="filterEmptyTargetLabel"></span>
              </label>
            </div>
            <div class="filter-field filter-grow">
              <label id="filterSearchLabel" for="filterText"></label>
              <input
                type="search"
                id="filterText"
                class="filter-text"
                placeholder=""
                autocomplete="off"
                spellcheck="false"
              />
            </div>
            <button type="button" id="filterClear" class="filter-clear"></button>
          </div>
        </div>
        <p id="filterHint" class="filter-hint"></p>
        <div id="status"></div>
        <div id="viewport">
          <div id="spacer"></div>
        </div>
      </div>
    </div>
    <script type="application/json" id="bcxlf-ui-json">{{BCXLF_UI_JSON}}</script>
    <script src="{{SCRIPT_URI}}"></script>
  </body>
</html>
